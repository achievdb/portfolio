<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Ahmed Abunaja</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="sticky-top">
      <nav class="navbar navbar-dark site-navbar py-4">
        <div
          class="container d-flex flex-column align-items-center justify-content-center gap-3"
        >
          <a class="navbar-brand m-0 p-0" href="index.html">
            <img src="assets/images/logo.png" alt="AA logo" class="logo-img" />
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse show" id="mainNav">
            <ul class="navbar-nav flex-column align-items-center gap-2 ms-0">
              <li class="nav-item">
                <a
                  class="nav-link rounded-pill text-center px-4"
                  href="index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link rounded-pill text-center px-4"
                  href="portfolio.html"
                  >Portfolio</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link active rounded-pill text-center px-4"
                  href="contact.html"
                  >Contact</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <div class="container py-5 flex-grow-1">
      <div class="d-block">
        <main class="w-100">
          <section class="simple-box p-4 text-light rounded-1 border">
            <h1 class="mb-3">Contact</h1>

            <form
              name="contact"
              method="POST"
              action="/bedankt.html"
              data-netlify="true"
              netlify
              netlify-honeypot="bot-field"
            >
              <input type="hidden" name="form-name" value="contact" />
              <p class="d-none">
                <label>Laat dit veld leeg: <input name="bot-field" /></label>
              </p>

              <div class="mb-3">
                <label for="naam" class="form-label">Naam</label>
                <input
                  type="text"
                  class="form-control"
                  id="naam"
                  name="naam"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="bericht" class="form-label">Bericht</label>
                <textarea
                  class="form-control"
                  id="bericht"
                  name="bericht"
                  rows="5"
                  required
                ></textarea>
              </div>

              <button type="submit" class="btn btn-primary">Versturen</button>
            </form>
          </section>
        </main>

        <aside class="w-100 mt-4">
          <section class="simple-box p-4 mb-4 text-light rounded-1 border">
            <h2 class="h5">Mijn gegevens</h2>
            <div class="gegevens-box">
              <div class="gegevens-info">
                <p><strong>Naam:</strong> Ahmed Abunaja</p>
                <p><strong>Opleiding:</strong> Systeem- en netwerkbeheer</p>
                <p><strong>School:</strong> AP Hogeschool</p>
              </div>
              <img
                src="assets/images/foto.jpg"
                alt="Profielfoto Ahmed Abunaja"
                class="professionele-foto rounded-1 border flex-shrink-0 object-fit-cover"
              />
            </div>
          </section>

          <section class="simple-box p-4 text-light rounded-1 border">
            <h2 class="h5 mb-3">Locatie</h2>
            <div id="map"></div>
          </section>
        </aside>
      </div>
    </div>

    <footer class="footer-simple py-3 mt-auto text-center">
      <div class="container">
        <p class="mb-0">&copy; <span id="year">2026</span> Ahmed Abunaja</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
